<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextApp Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e8e8e4;
      --text: #1a1a18;
      --muted: #767672;
      --accent: #1a1a18;
      --open: #2563eb;
      --done: #16a34a;
      --blocked: #dc2626;
      --tag-bg: #f0f0ec;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
    .team-name { color: var(--muted); font-size: 14px; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .search-input {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      outline: none;
      font-family: inherit;
      width: 200px;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Main content */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 24px;
      padding: 16px 0 24px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value.open { color: var(--open); }
    .stat-value.blocked { color: var(--blocked); }
    .stat-value.done { color: var(--done); }

    /* Owner group */
    .owner-group { margin-bottom: 32px; }

    .owner-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }

    .owner-name { font-weight: 600; font-size: 15px; }
    .task-count { font-size: 12px; color: var(--muted); }

    /* Task card */
    .task-list { display: flex; flex-direction: column; gap: 1px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: box-shadow 0.15s;
    }
    .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.open { background: var(--open); }
    .status-dot.done { background: var(--done); }
    .status-dot.blocked { background: var(--blocked); }

    .task-title {
      flex: 1;
      font-size: 14px;
    }
    .task-title.done { text-decoration: line-through; color: var(--muted); }

    .due-badge {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--tag-bg);
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .due-badge.overdue { background: #fef2f2; color: var(--blocked); }
    .due-badge.today { background: #eff6ff; color: var(--open); font-weight: 500; }

    .status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .status-badge.blocked { background: #fef2f2; color: var(--blocked); }

    /* Empty / loading states */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--muted);
    }

    /* Last updated */
    .meta {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      padding: 8px 0;
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .filter-bar { padding: 12px 16px; }
      main { padding: 0 16px 32px; }
      .stat-value { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">TextApp</span>
    <span class="team-name" id="teamName">Loading...</span>
  </div>
  <div class="header-right">
    <span class="meta" id="lastUpdated"></span>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="open" onclick="setFilter('open')">Open</button>
  <button class="filter-btn" data-filter="blocked" onclick="setFilter('blocked')">Blocked</button>
  <button class="filter-btn" data-filter="all" onclick="setFilter('all')">All</button>
  <input class="search-input" id="searchInput" placeholder="Search tasks..." oninput="render()">
</div>

<main>
  <div class="stats" id="stats"></div>
  <div id="content"><div class="loading">Loading tasks...</div></div>
</main>

<script>
  let allTasks = [];
  let allUsers = [];
  let team = null;
  let currentFilter = 'open';

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    render();
  }

  function formatDate(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T12:00:00Z');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function isOverdue(dateStr) {
    if (!dateStr) return false;
    const today = new Date().toISOString().split('T')[0];
    return dateStr < today;
  }

  function isToday(dateStr) {
    if (!dateStr) return false;
    const today = new Date().toISOString().split('T')[0];
    return dateStr === today;
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function render() {
    const query = document.getElementById('searchInput').value.toLowerCase();

    let filtered = allTasks;
    if (currentFilter !== 'all') {
      filtered = filtered.filter(t => t.status === currentFilter);
    }
    if (query) {
      filtered = filtered.filter(t =>
        t.title.toLowerCase().includes(query) ||
        (t.owner?.name || '').toLowerCase().includes(query)
      );
    }

    // Stats (always show counts of everything)
    const openCount = allTasks.filter(t => t.status === 'open').length;
    const blockedCount = allTasks.filter(t => t.status === 'blocked').length;
    const doneCount = allTasks.filter(t => t.status === 'done').length;

    document.getElementById('stats').innerHTML = `
      <div class="stat"><span class="stat-value open">${openCount}</span><span class="stat-label">Open</span></div>
      <div class="stat"><span class="stat-value blocked">${blockedCount}</span><span class="stat-label">Blocked</span></div>
      <div class="stat"><span class="stat-value done">${doneCount}</span><span class="stat-label">Done</span></div>
    `;

    if (filtered.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          <h3>No tasks here</h3>
          <p>Text your team number to create tasks.</p>
        </div>`;
      return;
    }

    // Group by owner
    const byOwner = {};
    for (const t of filtered) {
      const name = t.owner?.name || 'Unassigned';
      if (!byOwner[name]) byOwner[name] = [];
      byOwner[name].push(t);
    }

    const html = Object.entries(byOwner).map(([name, tasks]) => {
      const taskItems = tasks.map(t => {
        const overdue = t.due_date && isOverdue(t.due_date);
        const today = t.due_date && isToday(t.due_date);

        const dueBadge = t.due_date
          ? `<span class="due-badge ${overdue ? 'overdue' : today ? 'today' : ''}">
               ${overdue ? '⚠ ' : today ? '📌 ' : ''}${formatDate(t.due_date)}
             </span>`
          : '';

        const statusBadge = t.status === 'blocked'
          ? `<span class="status-badge blocked">blocked</span>` : '';

        return `
          <div class="task-card">
            <div class="status-dot ${t.status}"></div>
            <span class="task-title ${t.status === 'done' ? 'done' : ''}">${escHtml(t.title)}</span>
            ${dueBadge}
            ${statusBadge}
          </div>`;
      }).join('');

      return `
        <div class="owner-group">
          <div class="owner-header">
            <div class="avatar">${initials(name)}</div>
            <span class="owner-name">${escHtml(name)}</span>
            <span class="task-count">${tasks.length} task${tasks.length === 1 ? '' : 's'}</span>
          </div>
          <div class="task-list">${taskItems}</div>
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = html;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadData() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) {
        if (res.status === 401) {
          document.getElementById('content').innerHTML =
            '<div class="empty"><h3>Session expired</h3><p>Text "dashboard" to your team number for a new link.</p></div>';
          return;
        }
        throw new Error('Failed to load');
      }
      const data = await res.json();
      allTasks = data.tasks || [];
      allUsers = data.users || [];
      team = data.team;

      document.getElementById('teamName').textContent = team.name;
      document.title = `${team.name} — TextApp`;
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

      render();
    } catch (err) {
      document.getElementById('content').innerHTML =
        `<div class="empty"><h3>Error loading tasks</h3><p>${err.message}</p></div>`;
    }
  }

  // Load on mount, then refresh every 60s
  loadData();
  setInterval(loadData, 60_000);
</script>
</body>
</html>
